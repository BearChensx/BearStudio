# Build Next.js (standalone) in CI and deploy to ECS over SSH.
#
# Required repo Secrets:
#   SSH_PRIVATE_KEY          — same as server workflow
#   SSH_HOST, SSH_USER
#   DEPLOY_WEB_DIR           — remote directory for the standalone bundle (e.g. /opt/bearstudio/bearstudio-web)
#   NEXT_PUBLIC_SERVER_URL   — passed at build time; must be the browser-reachable API base (no trailing slash)
#
# Remote: passwordless sudo for `systemctl restart bearstudio-web`.
# Expected unit runs: node .../standalone/server.js with WorkingDirectory = DEPLOY_WEB_DIR (see comment at bottom).

name: Deploy web

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "bearstudio-web/**"
      - ".github/workflows/deploy-web.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"
          cache-dependency-path: bearstudio-web/pnpm-lock.yaml

      - name: Install and build
        working-directory: bearstudio-web
        env:
          NEXT_PUBLIC_SERVER_URL: ${{ secrets.NEXT_PUBLIC_SERVER_URL }}
        run: |
          set -euo pipefail
          pnpm install --frozen-lockfile
          pnpm exec next build

      - name: Assemble standalone bundle
        working-directory: bearstudio-web
        run: |
          set -euo pipefail
          test -d .next/standalone
          cp -r public .next/standalone/public
          mkdir -p .next/standalone/.next
          cp -r .next/static .next/standalone/.next/static
          tar -C .next -czf "$GITHUB_WORKSPACE/web-standalone.tgz" standalone

      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Known hosts
        run: mkdir -p ~/.ssh && ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload bundle and restart
        env:
          REMOTE: ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}
          DEPLOY_WEB_DIR: ${{ secrets.DEPLOY_WEB_DIR }}
        run: |
          set -euo pipefail
          scp web-standalone.tgz "$REMOTE:/tmp/web-standalone.tgz"
          ssh "$REMOTE" "set -euo pipefail; DIR='${DEPLOY_WEB_DIR}'; mkdir -p \"\$DIR\"; tar -xzf /tmp/web-standalone.tgz -C \"\$DIR\"; rm -f /tmp/web-standalone.tgz; sudo systemctl restart bearstudio-web"
